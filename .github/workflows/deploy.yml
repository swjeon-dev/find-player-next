# next 마이그레이션 이후 vercel로 배포하면서 사용하지 않을 예정
name: Deploy to GitHub Pages

on:
  push:
    # deploy -> master (배포 브랜치 변경)
    branches: [main]
    # 테스트 브랜치
    # branches: [feat/migrate-to-functions]
    # 아래 경로만 변경된 push/merge일 때만 배포 (워크플로·README·functions 단독 변경 시 스킵)
    paths:
      - 'src/**'
      - 'common/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 에디터 린트 오류 방지를 위해 따옴표 추가
    env:
      NEXT_PUBLIC_BASE_PATH: '/find-player-game'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # 1. 루트 의존성 설치
        run: npm ci

      - name: Build project
        run: npm run build
        # TODO(Next): GitHub Pages 정적 배포 시 next.config에 output: 'export', distDir 설정 필요
        # Vercel 전환 후 이 워크플로는 제거 예정

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    # 오직 master 브랜치에 push(merge 포함)되었을 때만 실제 배포 수행
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
